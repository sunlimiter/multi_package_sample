name: multi_package_sample
publish_to: none
repository: https://github.com/sunlimiter/multi_package_sample

environment:
  sdk: '^3.11.3'
workspace:
  - app
  - infrastructure/**
  - features/**
dev_dependencies:
  melos: ^7.4.1
melos:
  command:
    version:
      linkToCommits: true
      workspaceChangelog: true

    clean:
      hooks:
        post: melos exec --flutter --concurrency=3 -- "flutter clean"
  scripts:
    lint:all:
      run: melos run analyze && melos run format
      description: Run all static analysis checks.

    analyze:
      # We are setting the concurrency to 1 because a higher concurrency can crash
      # the analysis server on low performance machines (like GitHub Actions).
      run: |
        melos exec -c 5 -- \
          dart analyze . --fatal-infos
      description: |
        Run `dart analyze` in all packages.
         - Note: you can also rely on your IDEs Dart Analysis / Issues window.

    format:
      run: |
        melos exec -c 5 -- \
          dart format . -l 120
      description: |
        Run `flutter format .` in all packages.
          - Note: 格式化长度放开到120个字符

    #  install:
    #    run: melos exec -c 6 flutter pub get
    #    description: Install all dependencies
    #  clean:
    #    run: melos exec -c 6 -- flutter clean && melos run install
    #    description: Clean Flutter packages in this project and run bootstrap
    pubspec_dependency_sorter: >
      melos exec -c 6 -- "flutter pub run pubspec_dependency_sorter"

    l10n:
      run: melos exec -c 1 --fail-fast  --depends-on=flutter_localizations -- \
        flutter gen-l10n
      description: Generates l10n for all app packages.
    
    generate:
      run: |
        melos exec \
          --concurrency=1 \
          --fail-fast \
          --depends-on="build_runner" \
          -- \
          "dart run build_runner build --delete-conflicting-outputs"
      description: Run build_runner in all packages that depend on it

    build:qa:
      run: |
        cd app && flutter build apk --release --dart-define-from-file=../.env.qa
      description: Build QA release APK

    build:prod:
      run: |
        cd app && flutter build apk --release --dart-define-from-file=../.env.prod
      description: Build Production release APK